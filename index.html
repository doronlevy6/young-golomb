<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ניווט ספר תורה</title>
    <meta
      name="description"
      content="ניווט ספר תורה לפי פרשה, פרק, פסוק, מילים או עמודה."
    />
    <link rel="icon" href="./assets/golomb-logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="./assets/golomb-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700&family=Heebo:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="brand">
          <img class="brand-mark" src="./assets/golomb-logo.png" alt="" />
          <div class="brand-copy">
            <h1>ניווט ספר תורה</h1>
            <p class="eyebrow">245 / 42</p>
          </div>
          <span class="status-pill" id="data-status">טוען...</span>
        </div>

        <section id="today-info" class="today-info" aria-live="polite">
          <div class="today-copy">
            <p class="today-kicker">היום בבני ברק</p>
            <h2 class="today-title">טוען תאריך...</h2>
            <div class="today-dates">
              <span>טוען תאריך לועזי...</span>
            </div>
          </div>
          <div class="today-zmanim">
            <div class="today-zman today-zman-placeholder">
              <span>שעות היום</span>
              <strong>טוען...</strong>
            </div>
          </div>
        </section>
      </header>

      <main class="main-shell">
        <div class="mode-tabs" id="mode-tabs">
          <button class="mode-tab is-active" type="button" data-tab="navigator">ניווט</button>
          <button class="mode-tab" type="button" data-tab="journal">יומן</button>
        </div>

        <section id="navigator-view" class="tab-view">
          <div class="layout">
            <section class="panel search-panel">
              <form id="navigator-form" class="search-form">
                <label class="field">
                  <span>אני נמצא ב</span>
                  <input
                    id="current-query"
                    name="current"
                    list="query-suggestions"
                    placeholder="פרשה / שמות כ / במדבר כב ב / עמודה"
                    autocomplete="off"
                  />
                </label>
                <div id="current-segment-picker" class="segment-picker" hidden></div>

                <label class="field">
                  <span>רוצה להגיע ל</span>
                  <input
                    id="target-query"
                    name="target"
                    list="query-suggestions"
                    placeholder="פרשה / שמות כ / במדבר כב ב / עמודה"
                    autocomplete="off"
                  />
                </label>
                <div id="target-segment-picker" class="segment-picker" hidden></div>

                <div class="actions compact-actions">
                  <button class="primary-button" type="submit">חיפוש</button>
                  <button class="ghost-button small-button" id="reset-button" type="button">איפוס</button>
                </div>

                <div class="field-actions">
                  <button class="ghost-button small-button" id="clear-current-button" type="button">נקה מקור</button>
                  <button class="ghost-button small-button" id="clear-target-button" type="button">נקה יעד</button>
                </div>

                <p class="compact-hint">פרשה, ספר פרק פסוק, עמודה, או <code>יתרו + אנכי</code></p>
                <div id="reading-defaults" class="reading-defaults" hidden></div>
              </form>
            </section>

            <section class="panel results-panel">
              <div id="results" class="results empty-state">
                <p>מלא שדה אחד או שניים.</p>
              </div>

              <div id="column-preview" class="column-preview empty-state">
                <p>כאן יופיעו העמודות.</p>
              </div>
            </section>
          </div>
        </section>

        <section id="journal-view" class="tab-view journal-view" hidden>
          <div class="journal-layout">
            <section class="panel journal-summary-panel">
              <div id="journal-summary" class="journal-summary empty-state">
                <p>טוען יומן...</p>
              </div>
            </section>

            <section class="panel journal-months-panel">
              <div id="journal-months" class="journal-months empty-state">
                <p>טוען חודשים...</p>
              </div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <datalist id="query-suggestions"></datalist>

    <div id="viewer-modal" class="viewer-modal" hidden>
      <div class="viewer-shell">
        <div class="viewer-top" id="viewer-topbar">
          <div id="viewer-meta" class="viewer-meta"></div>
          <button class="ghost-button" id="viewer-close" type="button">סגור</button>
        </div>

        <div class="viewer-toolbar" id="viewer-controls">
          <button class="secondary-button viewer-search-toggle" id="viewer-search-toggle" type="button">
            חיפוש מילה
          </button>

          <label class="viewer-column-picker">
            <span>עמודה</span>
            <input
              id="viewer-column-input"
              type="number"
              min="1"
              max="245"
              step="1"
              inputmode="numeric"
            />
          </label>

          <label class="zoom-control">
            <span>זום</span>
            <input id="viewer-zoom" type="range" min="1" max="4" step="0.1" value="1" />
          </label>
        </div>

        <div id="viewer-stage" class="viewer-stage">
          <button class="viewer-overlay-arrow viewer-overlay-prev" id="viewer-prev" type="button" aria-label="עמודה קודמת">
            ›
          </button>
          <button class="viewer-overlay-arrow viewer-overlay-next" id="viewer-next" type="button" aria-label="עמודה הבאה">
            ‹
          </button>
          <div id="viewer-watermark" class="viewer-watermark"></div>
          <div class="viewer-search-panel" id="viewer-search-panel" hidden>
            <label class="viewer-search-field">
              <span>מילה קרובה</span>
              <input
                id="viewer-search-input"
                type="text"
                placeholder="חפש באותה עמודה או ליד"
                autocomplete="off"
                inputmode="search"
              />
            </label>
            <div id="viewer-search-results" class="viewer-search-results"></div>
          </div>
          <div id="viewer-media" class="viewer-media">
            <div id="viewer-highlights" class="viewer-highlights"></div>
            <img id="viewer-image" class="viewer-image" alt="" />
          </div>
        </div>
      </div>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
