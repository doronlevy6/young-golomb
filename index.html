<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ניווט ספר תורה</title>
    <meta
      name="description"
      content="ניווט ספר תורה לפי פרשה, פרק, פסוק, מילים או עמודה."
    />
    <link rel="icon" href="./assets/golomb-logo.png" type="image/png" />
    <link rel="apple-touch-icon" href="./assets/golomb-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;700&family=Heebo:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="brand">
          <img class="brand-mark" src="./assets/golomb-logo.png" alt="" />
          <div class="brand-copy">
            <h1>ניווט ספר תורה</h1>
            <p class="eyebrow">245 / 42</p>
          </div>
          <span class="status-pill" id="data-status">טוען...</span>
        </div>
      </header>

      <main class="layout">
        <section class="panel search-panel">
          <form id="navigator-form" class="search-form">
            <label class="field">
              <span>אני נמצא ב</span>
              <input
                id="current-query"
                name="current"
                list="query-suggestions"
                placeholder="פרשה / פרק / פסוק / מילים / עמודה"
                autocomplete="off"
              />
            </label>
            <div class="builder" data-side="current">
              <div class="builder-modes">
                <button class="builder-chip is-active" type="button" data-side="current" data-mode="free">
                  חופשי
                </button>
                <button class="builder-chip" type="button" data-side="current" data-mode="parashah">
                  פרשה
                </button>
                <button class="builder-chip" type="button" data-side="current" data-mode="reference">
                  חומש / פרק / פסוק
                </button>
              </div>

              <div class="builder-panel" id="current-parashah-panel" hidden>
                <label class="picker-field">
                  <span>פרשה</span>
                  <select id="current-parashah-select"></select>
                </label>
              </div>

              <div class="builder-panel builder-grid" id="current-reference-panel" hidden>
                <label class="picker-field">
                  <span>חומש</span>
                  <select id="current-book-select"></select>
                </label>
                <label class="picker-field">
                  <span>פרק</span>
                  <select id="current-chapter-select"></select>
                </label>
                <label class="picker-field">
                  <span>פסוק</span>
                  <select id="current-verse-select"></select>
                </label>
              </div>

              <div class="builder-panel" id="current-words-panel" hidden>
                <label class="picker-field">
                  <span>מילים קרובות</span>
                  <input
                    id="current-words-input"
                    type="text"
                    placeholder="אופציונלי"
                    autocomplete="off"
                  />
                </label>
              </div>
            </div>

            <label class="field">
              <span>רוצה להגיע ל</span>
              <input
                id="target-query"
                name="target"
                list="query-suggestions"
                placeholder="פרשה / פרק / פסוק / מילים / עמודה"
                autocomplete="off"
              />
            </label>
            <div class="builder" data-side="target">
              <div class="builder-modes">
                <button class="builder-chip is-active" type="button" data-side="target" data-mode="free">
                  חופשי
                </button>
                <button class="builder-chip" type="button" data-side="target" data-mode="parashah">
                  פרשה
                </button>
                <button class="builder-chip" type="button" data-side="target" data-mode="reference">
                  חומש / פרק / פסוק
                </button>
              </div>

              <div class="builder-panel" id="target-parashah-panel" hidden>
                <label class="picker-field">
                  <span>פרשה</span>
                  <select id="target-parashah-select"></select>
                </label>
              </div>

              <div class="builder-panel builder-grid" id="target-reference-panel" hidden>
                <label class="picker-field">
                  <span>חומש</span>
                  <select id="target-book-select"></select>
                </label>
                <label class="picker-field">
                  <span>פרק</span>
                  <select id="target-chapter-select"></select>
                </label>
                <label class="picker-field">
                  <span>פסוק</span>
                  <select id="target-verse-select"></select>
                </label>
              </div>

              <div class="builder-panel" id="target-words-panel" hidden>
                <label class="picker-field">
                  <span>מילים קרובות</span>
                  <input
                    id="target-words-input"
                    type="text"
                    placeholder="אופציונלי"
                    autocomplete="off"
                  />
                </label>
              </div>
            </div>

            <div class="actions compact-actions">
              <button class="primary-button" type="submit">חיפוש</button>
              <button class="ghost-button small-button" id="reset-button" type="button">איפוס</button>
            </div>
          </form>
        </section>

        <section class="panel results-panel">
          <div id="results" class="results empty-state">
            <p>מלא שדה אחד או שניים.</p>
          </div>

          <div id="column-preview" class="column-preview empty-state">
            <p>כאן יופיעו העמודות.</p>
          </div>
        </section>
      </main>
    </div>

    <datalist id="query-suggestions"></datalist>

    <div id="viewer-modal" class="viewer-modal" hidden>
      <div class="viewer-shell">
        <div class="viewer-top" id="viewer-topbar">
          <div id="viewer-meta" class="viewer-meta"></div>
          <button class="ghost-button" id="viewer-close" type="button">סגור</button>
        </div>

        <div class="viewer-toolbar" id="viewer-controls">
          <div class="viewer-nav">
            <button class="secondary-button" id="viewer-prev" type="button">הקודם</button>
            <button class="secondary-button" id="viewer-next" type="button">הבא</button>
          </div>

          <label class="viewer-column-picker">
            <span>עמודה</span>
            <input
              id="viewer-column-input"
              type="number"
              min="1"
              max="245"
              step="1"
              inputmode="numeric"
            />
          </label>

          <label class="zoom-control">
            <span>זום</span>
            <input id="viewer-zoom" type="range" min="1" max="4" step="0.1" value="1" />
          </label>
        </div>

        <div id="viewer-stage" class="viewer-stage">
          <div id="viewer-stage-meta" class="viewer-stage-meta"></div>
          <div id="viewer-watermark" class="viewer-watermark"></div>
          <img id="viewer-image" class="viewer-image" alt="" />
        </div>
      </div>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
